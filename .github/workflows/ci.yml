name: CI

on:
  pull_request:
  push:
    branches:
      - master

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Cargo check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            libegl1-mesa-dev \
            libgles2-mesa-dev \
            libwayland-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check package
        run: cargo check --locked

      - name: Check without default features
        run: cargo check --no-default-features --locked

      - name: Check simple-wm example
        run: cargo check --example simple-wm --locked

      - name: Check unused dependencies
        run: nix-shell --run "cargo machete"

      - name: Audit dependencies
        run: nix-shell --run "cargo audit --deny warnings"

  publish:
    name: Publish crate
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Read crate metadata
        id: crate
        run: |
          metadata="$(cargo metadata --no-deps --format-version 1)"

          name="$(python3 -c '
          import json, sys
          data = json.load(sys.stdin)
          root = data["resolve"]["root"]
          package = next(p for p in data["packages"] if p["id"] == root)
          print(package["name"])
          ' <<< "$metadata")"

          version="$(python3 -c '
          import json, sys
          data = json.load(sys.stdin)
          root = data["resolve"]["root"]
          package = next(p for p in data["packages"] if p["id"] == root)
          print(package["version"])
          ' <<< "$metadata")"

          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check whether version is already published
        id: published
        run: |
          name="${{ steps.crate.outputs.name }}"
          version="${{ steps.crate.outputs.version }}"

          status="$(curl -sS -o /dev/null -w '%{http_code}' \
            "https://crates.io/api/v1/crates/${name}/${version}")"

          if [ "$status" = "200" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "$name $version is already published"
          elif [ "$status" = "404" ]; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "$name $version is not published yet"
          else
            echo "Unexpected crates.io response: $status" >&2
            exit 1
          fi

      - name: Authenticate to crates.io
        if: steps.published.outputs.exists == 'false'
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish crate
        if: steps.published.outputs.exists == 'false'
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
