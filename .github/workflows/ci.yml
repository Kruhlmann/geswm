name: CI

on:
  pull_request:
  push:
    branches:
      - master

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Cargo check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            libegl1-mesa-dev \
            libgles2-mesa-dev \
            libwayland-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check package
        run: cargo check --locked

      - name: Check without default features
        run: cargo check --no-default-features --locked

      - name: Check simple-wm example
        run: cargo check --example simple-wm --locked

      - name: Check unused dependencies
        run: nix-shell --run "cargo machete"

      - name: Audit dependencies
        run: nix-shell --run "cargo audit --deny warnings"
